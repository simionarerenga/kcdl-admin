name: Android APK Build — KCDL Admin

on:
  workflow_dispatch:

env:
  ANDROID_API_LEVEL:   "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  NODE_VERSION:        "20"
  JAVA_VERSION:        "17"

jobs:
  build-android:
    name: Build KCDL Admin Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up JDK ${{ env.JAVA_VERSION }} (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS }}"

      - name: Install npm dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick > /dev/null 2>&1

      # ── Launcher icons ──────────────────────────────────────────────
      # Uses icon_launcher.jpg (light blue background) — square & round
      - name: Generate launcher icons
        run: |
          ICON_SRC="android/app/src/main/res"
          LAUNCHER="public/icon_launcher.jpg"

          for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            dir="${entry%%:*}"
            px="${entry##*:}"
            mkdir -p "$ICON_SRC/mipmap-$dir"

            # Square launcher icon
            convert "$LAUNCHER" -resize "${px}x${px}!" \
              "$ICON_SRC/mipmap-$dir/ic_launcher.png"

            # Round launcher icon (circle-cropped, transparent bg)
            convert "$LAUNCHER" -resize "${px}x${px}!" \
              \( +clone -alpha extract \
                 -draw "fill black rectangle 0,0 ${px},${px} \
                        fill white circle $((px/2)),$((px/2)) $((px/2)),1" \) \
              -alpha off -compose multiply -composite \
              -background none \
              "$ICON_SRC/mipmap-$dir/ic_launcher_round.png"

            echo "✓ $dir  ${px}×${px}"
          done

          # Remove adaptive icon XMLs so PNGs take effect on Android 8+
          rm -rf "$ICON_SRC/mipmap-anydpi-v26"
          echo "✓ Adaptive icon XMLs removed"

      # ── Splash screens ──────────────────────────────────────────────
      # Uses icon_bg.png (white background logo) centered on white canvas
      - name: Generate splash screens
        run: |
          RES="android/app/src/main/res"
          LOGO="public/icon_bg.png"

          # Portrait sizes: folder → WxH  logo-size
          declare -A PORT=(
            ["drawable-port-mdpi"]="320x480:180"
            ["drawable-port-hdpi"]="480x800:260"
            ["drawable-port-xhdpi"]="720x1280:400"
            ["drawable-port-xxhdpi"]="960x1600:520"
            ["drawable-port-xxxhdpi"]="1280x1920:680"
          )

          # Landscape sizes
          declare -A LAND=(
            ["drawable-land-mdpi"]="480x320:180"
            ["drawable-land-hdpi"]="800x480:260"
            ["drawable-land-xhdpi"]="1280x720:400"
            ["drawable-land-xxhdpi"]="1600x960:520"
            ["drawable-land-xxxhdpi"]="1920x1280:680"
          )

          for folder in "${!PORT[@]}"; do
            dims="${PORT[$folder]%%:*}"
            logo_px="${PORT[$folder]##*:}"
            mkdir -p "$RES/$folder"
            convert -size "$dims" xc:white \
              \( "$LOGO" -resize "${logo_px}x${logo_px}" \) \
              -gravity center -composite \
              "$RES/$folder/splash.png"
            echo "✓ $folder  $dims"
          done

          for folder in "${!LAND[@]}"; do
            dims="${LAND[$folder]%%:*}"
            logo_px="${LAND[$folder]##*:}"
            mkdir -p "$RES/$folder"
            convert -size "$dims" xc:white \
              \( "$LOGO" -resize "${logo_px}x${logo_px}" \) \
              -gravity center -composite \
              "$RES/$folder/splash.png"
            echo "✓ $folder  $dims"
          done

          # Default drawable fallback
          mkdir -p "$RES/drawable"
          convert -size 1080x1920 xc:white \
            \( "$LOGO" -resize 700x700 \) \
            -gravity center -composite \
            "$RES/drawable/splash.png"
          echo "✓ drawable/splash.png (default)"

      - name: Write android/local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --warning-mode all \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/kcdl-admin.apk
          echo "✓ APK renamed to kcdl-admin.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcdl-admin-apk
          path: android/app/build/outputs/apk/debug/kcdl-admin.apk
          retention-days: 30
          if-no-files-found: error
